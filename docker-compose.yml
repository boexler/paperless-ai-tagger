x-webhook-receiver: &webhook-receiver-base
  build:
    context: .
    dockerfile: services/webhook-receiver/Dockerfile
  restart: unless-stopped
  environment: &webhook-receiver-env
    WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    AGENT_PROVIDER: ${AGENT_PROVIDER:-cursor}
    CURSOR_API_KEY: ${CURSOR_API_KEY:-}
    CURSOR_MODEL: ${CURSOR_MODEL:-composer-2.5}
    CURSOR_MODEL_PARAMS: ${CURSOR_MODEL_PARAMS:-fast:false}
    CURSOR_LIST_MODELS_ON_STARTUP: ${CURSOR_LIST_MODELS_ON_STARTUP:-false}
    CODEX_API_KEY: ${CODEX_API_KEY:-}
    CODEX_MODEL: ${CODEX_MODEL:-gpt-5.4-mini}
    CODEX_REASONING_EFFORT: ${CODEX_REASONING_EFFORT:-low}
    CODEX_MODEL_VERBOSITY: ${CODEX_MODEL_VERBOSITY:-low}
    CODEX_APPROVAL_POLICY: ${CODEX_APPROVAL_POLICY:-never}
    CODEX_SANDBOX: ${CODEX_SANDBOX:-workspace-write}
    CODEX_NETWORK_ACCESS: ${CODEX_NETWORK_ACCESS:-true}
    CODEX_COMMAND: ${CODEX_COMMAND:-codex}
    CODEX_HOME: ${CODEX_HOME:-/data/codex}
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-ultra-550b-a55b:free}
    OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-https://github.com/boexler/paperless-ai-tagger}
    OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-paperless-ai-tagger}
    OPENROUTER_MAX_CONTENT_CHARS: ${OPENROUTER_MAX_CONTENT_CHARS:-1000000}
    OPENROUTER_RETRY_ATTEMPTS: ${OPENROUTER_RETRY_ATTEMPTS:-3}
    OPENROUTER_RETRY_BACKOFF_SECONDS: ${OPENROUTER_RETRY_BACKOFF_SECONDS:-5}
    OPENROUTER_PROVIDERS: ${OPENROUTER_PROVIDERS:-}
    OPENROUTER_ALLOW_FALLBACKS: ${OPENROUTER_ALLOW_FALLBACKS:-true}
    OPENROUTER_DATA_COLLECTION: ${OPENROUTER_DATA_COLLECTION:-allow}
    OPENROUTER_ZDR: ${OPENROUTER_ZDR:-false}
    OPENROUTER_CONFIDENTIAL_MODEL: ${OPENROUTER_CONFIDENTIAL_MODEL:-}
    OPENROUTER_CONFIDENTIAL_TAGS: ${OPENROUTER_CONFIDENTIAL_TAGS:-vertraulich,confidential}
    OPENROUTER_CONFIDENTIAL_PROVIDERS: ${OPENROUTER_CONFIDENTIAL_PROVIDERS:-}
    OPENROUTER_CONFIDENTIAL_ALLOW_FALLBACKS: ${OPENROUTER_CONFIDENTIAL_ALLOW_FALLBACKS:-false}
    OPENROUTER_CONFIDENTIAL_DATA_COLLECTION: ${OPENROUTER_CONFIDENTIAL_DATA_COLLECTION:-deny}
    OPENROUTER_CONFIDENTIAL_ZDR: ${OPENROUTER_CONFIDENTIAL_ZDR:-true}
    PAPERLESS_BASE_URL: ${PAPERLESS_BASE_URL}
    PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    DEDUP_TTL_HOURS: ${DEDUP_TTL_HOURS:-24}
    DEDUP_SKIP_CHECK: ${DEDUP_SKIP_CHECK:-false}
    MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-1}
  networks:
    - paperless-ai-tagger

services:
  webhook-receiver-03-tag-document-tax:
    <<: *webhook-receiver-base
    container_name: paperless-ai-tagger-03-tag-document-tax.md
    environment:
      <<: *webhook-receiver-env
      PROMPT_TEMPLATE: 03-tag-document-tax.md
    volumes:
      - webhook-data-03-tag-document-tax:/data
    ports:
      - "${WEBHOOK_PORT_03:-8083}:8080"

networks:
  paperless-ai-tagger:
    driver: bridge

volumes:
  webhook-data-03-tag-document-tax:
