services:
  webhook-receiver:
    build:
      context: .
      dockerfile: services/webhook-receiver/Dockerfile
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      CURSOR_API_KEY: ${CURSOR_API_KEY}
      CURSOR_MODEL: ${CURSOR_MODEL:-composer-2.5}
      PAPERLESS_BASE_URL: ${PAPERLESS_BASE_URL}
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEDUP_TTL_HOURS: ${DEDUP_TTL_HOURS:-24}
      PROMPT_TEMPLATE_PATH: /app/prompts/tag-document.md
    volumes:
      - webhook-data:/data
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"
    networks:
      - paperless-ai-tagger

networks:
  paperless-ai-tagger:
    driver: bridge

volumes:
  webhook-data:
